冬(雪)登山</center>
<p>雪山の魅力はやはり素晴らしい景色です。同じ山でも夏と冬では景色が全く違い、山頂から見渡すことのできる真っ白な世界はとても美しいです。<BR>
また、冬は登山道が雪で見えないので自分で道を作って行くことになります。踏み跡がない分体力が必要ですが、振り返って自分の足跡が雪面に続いているのを見ると、何とも言えない達成感を味わうことができます。<BR>
