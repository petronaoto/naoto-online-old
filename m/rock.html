ロッククライミング</center>
<p>ワンゲルでは、主にジムと外岩でのクライミングをやっています。<BR>
初めてで不安に思う人もいるかもしれませんが、大丈夫！ジムでは下に厚いマットが敷いてあり、外では落下防止のロープをつけます。<BR>
自分一人の力で登りきった達成感は、登山とはまた違った感動があります。興味がある人は、是非先輩に教えてもらいましょう。<BR>
<BR>
<IMG src="クライミング11.png"><BR>
<BR>
トップロープと呼ばれるクライミング方法です。一番安全な方法で、フォール（落ちた）時にも下の人がロープを張ることで地面にたたきつけられることはありません。<BR>
<BR>
<IMG src="クライミング21.png"><BR>
<BR>
緊張の瞬間･･･。このスリルと、上りきったときの達成感がたまらない。<BR>
<BR>
</p>
