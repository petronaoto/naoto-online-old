    <p class=MsoNormal><span style='font-family:"ＭＳ ゴシック"'>本来は一人ではなく、高校時代の友人と共に行くつもりだったが、その友人が大学の研究で行く暇がないということで単独旅行を決意。<span

    lang=EN-US><o:p></o:p></span></span></p>
